<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Revision visual CMA - textiles andinos</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }
    header {
      padding: 24px 32px;
      background: #111;
      color: white;
    }
    header h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    main {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
      padding: 24px;
    }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }
    img {
      width: 100%;
      height: 280px;
      object-fit: contain;
      background: #eee;
      display: block;
    }
    .body {
      padding: 14px;
    }
    h2 {
      font-size: 16px;
      margin: 0 0 10px;
    }
    p {
      font-size: 13px;
      line-height: 1.35;
      margin: 6px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Revision visual CMA - textiles andinos</h1>
    <p>Total de candidatos: 0</p>
  </header>
  <main>
    
  </main>
</body>
</html>
